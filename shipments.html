<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipments — NXT Ship Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 260px;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --radius: 14px;
      --shadow: 0 2px 8px rgba(0,0,0,0.07), 0 6px 20px rgba(0,0,0,0.05);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); display:flex; min-height:100vh; color:var(--text); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      color: white;
      position: fixed; top:0; left:0;
      display:flex; flex-direction:column; z-index:100;
    }
    .sidebar-logo { padding:28px 22px 20px; border-bottom:1px solid rgba(255,255,255,0.07); }
    .sidebar-logo h2 { font-size:19px; font-weight:700; }
    .sidebar-logo p  { font-size:11px; color:rgba(255,255,255,0.35); margin-top:3px; }
    .sidebar-nav { padding:12px 10px; flex:1; }
    .sidebar-nav a {
      display:flex; align-items:center; gap:10px;
      padding:11px 14px; margin-bottom:3px; border-radius:10px;
      color:rgba(255,255,255,0.7); text-decoration:none;
      font-size:14px; font-weight:500; transition:0.18s;
    }
    .sidebar-nav a:hover { background:rgba(255,255,255,0.08); color:white; }
    .sidebar-nav a.active { background:rgba(37,99,235,0.35); color:#93c5fd; }
    .sidebar-bottom { padding:12px 10px; border-top:1px solid rgba(255,255,255,0.07); }
    .sidebar-bottom a {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:10px;
      color:rgba(255,255,255,0.5); text-decoration:none;
      font-size:14px; font-weight:500; cursor:pointer; transition:0.18s;
    }
    .sidebar-bottom a:hover { background:rgba(220,38,38,0.15); color:#fca5a5; }

    /* ── MAIN ── */
    .main { margin-left:var(--sidebar-w); width:100%; min-height:100vh; }

    /* ── TOPBAR ── */
    .topbar {
      background:white; padding:14px 26px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:50;
    }
    .topbar h1 { font-size:18px; font-weight:700; }
    .admin-badge { background:#eff6ff; color:var(--primary); padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }

    /* ── PAGE BODY ── */
    .page-body { padding:24px 26px; }

    /* ── CONTROLS ── */
    .controls {
      display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; align-items:center;
    }
    .controls input {
      padding:10px 13px; border-radius:8px;
      border:1.5px solid var(--border); font-size:13px; font-family:inherit;
      outline:none; flex:1; min-width:200px; transition:border-color 0.15s;
    }
    .controls input:focus { border-color:var(--primary); }
    .controls select {
      padding:10px 13px; border-radius:8px;
      border:1.5px solid var(--border); font-size:13px; font-family:inherit;
      outline:none; min-width:160px; background:white; transition:border-color 0.15s;
    }
    .btn {
      padding:10px 16px; border:none; border-radius:8px;
      font-size:13px; font-weight:700; cursor:pointer;
      font-family:inherit; transition:0.15s; white-space:nowrap;
    }
    .btn-primary { background:var(--primary); color:white; }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-ghost { background:white; color:var(--text); border:1.5px solid var(--border); }
    .btn-ghost:hover { background:#f1f5f9; }
    .btn-green  { background:#16a34a; color:white; }
    .btn-green:hover  { background:#15803d; }
    .btn-red    { background:#dc2626; color:white; }
    .btn-red:hover    { background:#b91c1c; }
    .btn-dark   { background:#1e293b; color:white; }
    .btn-dark:hover   { background:#0f172a; }
    .btn-sm { padding:6px 11px; font-size:12px; border-radius:7px; }

    /* ── TABLE BOX ── */
    .table-box { background:white; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .table-header {
      padding:18px 22px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
    }
    .table-header h2 { font-size:16px; font-weight:700; }
    .table-header span { font-size:13px; color:var(--muted); }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:700px; }
    thead tr { background:#f8fafc; }
    th {
      padding:11px 14px; text-align:left;
      font-size:11px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:0.5px;
      border-bottom:1px solid var(--border); white-space:nowrap;
    }
    td {
      padding:12px 14px; font-size:13px;
      border-bottom:1px solid #f1f5f9; color:var(--text);
    }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#fafbff; }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; padding:4px 11px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-green  { background:#dcfce7; color:#16a34a; }
    .badge-yellow { background:#fef3c7; color:#b45309; }
    .badge-blue   { background:#dbeafe; color:#1d4ed8; }
    .badge-red    { background:#fee2e2; color:#dc2626; }
    .badge-gray   { background:#f1f5f9; color:#475569; }

    /* ── ACTION BUTTONS CELL ── */
    .actions-cell { display:flex; gap:6px; flex-wrap:wrap; }

    /* ── POPUP ── */
    .popup-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.55); z-index:999;
      justify-content:center; align-items:center; padding:20px;
    }
    .popup-overlay.show { display:flex; }
    .popup-box {
      background:white; border-radius:18px; padding:28px;
      width:100%; max-width:580px; max-height:88vh; overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,0.25);
      animation:popIn 0.25s ease;
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    .popup-box h3 { font-size:17px; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

    .detail-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;
    }
    .detail-item {
      background:#f8fafc; border-radius:8px; padding:12px 14px;
    }
    .detail-item .di-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .detail-item .di-val   { font-size:14px; font-weight:600; margin-top:4px; }

    .timeline-box { margin-top:16px; }
    .timeline-box h4 { font-size:14px; font-weight:700; margin-bottom:12px; }
    .event {
      display:flex; gap:12px; padding:12px;
      border-left:3px solid var(--primary); margin-bottom:10px;
      background:#f1f5ff; border-radius:0 10px 10px 0;
    }
    .event .ev-dot { width:8px; height:8px; background:var(--primary); border-radius:50%; margin-top:4px; flex-shrink:0; }
    .event .ev-body b { font-size:13px; display:block; }
    .event .ev-body small { font-size:12px; color:var(--muted); }

    .popup-footer { display:flex; gap:10px; margin-top:20px; border-top:1px solid var(--border); padding-top:18px; }

    /* ── TOAST ── */
    .toast {
      position:fixed; top:20px; right:20px; z-index:9999;
      background:white; padding:14px 18px; border-radius:12px;
      font-size:13px; font-weight:600;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      animation:slideIn 0.3s ease; border-left:4px solid var(--primary);
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:50px 20px; }
    .empty-state .es-icon { font-size:44px; margin-bottom:14px; }
    .empty-state h3 { font-size:16px; font-weight:700; }
    .empty-state p  { font-size:13px; color:var(--muted); margin-top:6px; }

    /* ── LOADING ── */
    .loading-row td { text-align:center; padding:28px; color:var(--muted); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>🚚 NXT Ship</h2>
      <p>Admin Panel</p>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="add-shipment.html">➕ Add Shipment</a>
      <a href="shipments.html" class="active">📦 View Shipments</a>
      <a href="customers.html">👤 Customers</a>
    </nav>
    <div class="sidebar-bottom">
      <a onclick="logout()">🚪 Logout</a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <h1>All Shipments</h1>
      <div class="admin-badge">Admin 👋</div>
    </div>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Controls -->
      <div class="controls">
        <input id="searchInput" placeholder="🔍  Search waybill or order ID..." oninput="filterData()"/>
        <select id="statusFilter" onchange="filterData()">
          <option value="all">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="Booked">Booked</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
        <button class="btn btn-ghost" onclick="loadShipments()">🔄 Refresh</button>
        <button class="btn btn-primary" onclick="exportCSV()">📥 Export CSV</button>
      </div>

      <!-- Table -->
      <div class="table-box">
        <div class="table-header">
          <h2>📦 Shipments</h2>
          <span id="countLabel">Loading...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Waybill</th>
                <th>Order ID</th>
                <th>Customer</th>
                <th>City</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="shipmentTable">
              <tr class="loading-row"><td colspan="6">Loading shipments...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Detail / Track Popup -->
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <h3 id="popupTitle">📍 Shipment Details</h3>
      <div id="popupContent"></div>
      <div class="popup-footer">
        <button class="btn btn-ghost" style="flex:1" onclick="closePopup()">Close</button>
        <button class="btn btn-green" style="flex:1" id="trackBtn">📍 Track Live</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://nxtship-backend.onrender.com";
    const token = localStorage.getItem("adminToken");

    if (!token) {
      window.location.href = "login.html";
    }

    let allShipments = [];
    let filteredShipments = [];
    let currentShipment = null;

    function showToast(msg, color="#2563eb") {
      document.querySelectorAll(".toast").forEach(t => t.remove());
      const el = document.createElement("div");
      el.className = "toast";
      el.style.borderLeftColor = color;
      el.innerText = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function statusBadge(status) {
      const map = {
        "delivered":  "badge-green",
        "booked":     "badge-blue",
        "cancelled":  "badge-red",
        "pending":    "badge-yellow"
      };
      const cls = map[(status||"").toLowerCase()] || "badge-gray";
      return `<span class="badge ${cls}">${status || "Pending"}</span>`;
    }

    // ── LOAD ALL SHIPMENTS ──
    async function loadShipments() {
      const table = document.getElementById("shipmentTable");
      const label = document.getElementById("countLabel");
      table.innerHTML = `<tr class="loading-row"><td colspan="6">Loading shipments...</td></tr>`;
      label.innerText = "Loading...";

      try {
        const res = await fetch(`${BACKEND_URL}/api/shipment/all`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.success) {
          showToast("Failed to load shipments ❌", "#dc2626");
          table.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:28px;color:#dc2626;">Failed to load.</td></tr>`;
          return;
        }

        allShipments = data.shipments || [];
        filteredShipments = [...allShipments];
        renderTable(filteredShipments);

      } catch(err) {
        console.error(err);
        showToast("Server Error ❌", "#dc2626");
        table.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:28px;color:#dc2626;">Server unreachable.</td></tr>`;
      }
    }

    // ── RENDER TABLE ──
    function renderTable(shipments) {
      const table = document.getElementById("shipmentTable");
      const label = document.getElementById("countLabel");

      label.innerText = shipments.length + " shipment" + (shipments.length !== 1 ? "s" : "");

      if (!shipments.length) {
        table.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="es-icon">📦</div>
              <h3>No Shipments Found</h3>
              <p>Try changing your search or filter.</p>
            </div>
          </td></tr>
        `;
        return;
      }

      table.innerHTML = shipments.map((s, i) => `
        <tr>
          <td style="font-weight:700;">${s.waybill || "Not Assigned"}</td>
          <td style="color:var(--muted);">${s.orderId || "N/A"}</td>
          <td>${s.customerName || "N/A"}</td>
          <td>${s.city || s.deliveryCity || "N/A"}</td>
          <td>${statusBadge(s.status)}</td>
          <td>
            <div class="actions-cell">
              <button class="btn btn-dark btn-sm" onclick="showDetails(${i})">Details</button>
              <button class="btn btn-green btn-sm" onclick="openTrack(${i})">Track</button>
              <button class="btn btn-red btn-sm" onclick="cancelShipment('${s._id}', ${i})">Cancel</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    // ── SHOW DETAILS ──
    function showDetails(index) {
      currentShipment = filteredShipments[index];
      const s = currentShipment;

      document.getElementById("popupTitle").innerText = "📦 Shipment Details";
      document.getElementById("popupContent").innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><div class="di-label">Waybill</div><div class="di-val">${s.waybill || "Not Assigned"}</div></div>
          <div class="detail-item"><div class="di-label">Order ID</div><div class="di-val">${s.orderId || "N/A"}</div></div>
          <div class="detail-item"><div class="di-label">Customer</div><div class="di-val">${s.customerName || "N/A"}</div></div>
          <div class="detail-item"><div class="di-label">City</div><div class="di-val">${s.city || s.deliveryCity || "N/A"}</div></div>
          <div class="detail-item"><div class="di-label">Status</div><div class="di-val">${statusBadge(s.status)}</div></div>
          <div class="detail-item"><div class="di-label">Payment Mode</div><div class="di-val">${s.paymentMode || "N/A"}</div></div>
          <div class="detail-item"><div class="di-label">Weight</div><div class="di-val">${s.weight ? s.weight + " kg" : "N/A"}</div></div>
          <div class="detail-item"><div class="di-label">Order Value</div><div class="di-val">${s.orderValue ? "₹" + s.orderValue : "N/A"}</div></div>
        </div>
        <div class="timeline-box" id="timelineBox">
          <h4>📍 Tracking Timeline</h4>
          <p style="color:var(--muted);font-size:13px;">Click "Track Live" to load live tracking updates.</p>
        </div>
      `;

      document.getElementById("trackBtn").onclick = () => trackShipment(s.waybill);
      document.getElementById("popup").classList.add("show");
    }

    // ── OPEN TRACK directly ──
    function openTrack(index) {
      showDetails(index);
      const s = filteredShipments[index];
      setTimeout(() => trackShipment(s.waybill), 100);
    }

    // ── TRACK SHIPMENT ──
    async function trackShipment(waybill) {
      if (!waybill || waybill === "Not Assigned") {
        showToast("Waybill not assigned yet!", "#f97316");
        return;
      }

      const timelineBox = document.getElementById("timelineBox");
      if (timelineBox) timelineBox.innerHTML = `<h4>📍 Tracking Timeline</h4><p style="color:var(--muted);font-size:13px;">Loading live updates...</p>`;

      try {
        const res = await fetch(`${BACKEND_URL}/api/shipment/track/${waybill}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        const scans = data.tracking?.ShipmentData?.[0]?.Shipment?.Scans || [];

        if (!timelineBox) return;

        if (!scans.length) {
          timelineBox.innerHTML = `<h4>📍 Tracking Timeline</h4><p style="color:var(--muted);font-size:13px;">No tracking updates available yet.</p>`;
          return;
        }

        timelineBox.innerHTML = `
          <h4>📍 Tracking Timeline</h4>
          ${scans.map(scan => `
            <div class="event">
              <div class="ev-dot"></div>
              <div class="ev-body">
                <b>${scan.ScanDetail?.Scan || "Update"}</b>
                <small>📍 ${scan.ScanDetail?.ScannedLocation || ""} &nbsp;|&nbsp; 🕒 ${scan.ScanDetail?.ScanDateTime || ""}</small>
              </div>
            </div>
          `).join("")}
        `;
      } catch(err) {
        console.error(err);
        showToast("Tracking failed ❌", "#dc2626");
        const tb = document.getElementById("timelineBox");
        if (tb) tb.innerHTML = `<h4>📍 Tracking Timeline</h4><p style="color:#dc2626;font-size:13px;">Failed to load tracking data.</p>`;
      }
    }

    // ── CANCEL SHIPMENT ──
    async function cancelShipment(id, index) {
      const s = filteredShipments[index];
      if ((s.status||"").toLowerCase() === "cancelled") {
        showToast("Already cancelled", "#f97316");
        return;
      }
      if (!confirm(`Cancel shipment ${s.waybill || s.orderId}?`)) return;

      try {
        // Try POST first, fallback to PUT (matches most backends)
        const res = await fetch(`${BACKEND_URL}/api/shipment/cancel/${id}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.success) {
          showToast("✅ Shipment Cancelled");
          loadShipments();
        } else {
          showToast("Cancel failed: " + (data.message || "Unknown error"), "#dc2626");
        }
      } catch(err) {
        console.error(err);
        showToast("Server Error ❌", "#dc2626");
      }
    }

    // ── SEARCH + FILTER ──
    function filterData() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const status = document.getElementById("statusFilter").value;

      filteredShipments = allShipments.filter(s => {
        const matchSearch =
          (s.orderId || "").toLowerCase().includes(search) ||
          (s.waybill || "").toLowerCase().includes(search) ||
          (s.customerName || "").toLowerCase().includes(search);
        const matchStatus = status === "all" || (s.status||"") === status;
        return matchSearch && matchStatus;
      });

      renderTable(filteredShipments);
    }

    // ── EXPORT CSV ──
    function exportCSV() {
      if (!filteredShipments.length) { showToast("No data to export", "#f97316"); return; }

      const headers = ["Waybill","Order ID","Customer","City","Status","Payment Mode","Weight","Order Value"];
      const rows = filteredShipments.map(s => [
        `"${s.waybill||""}"`,
        `"${s.orderId||""}"`,
        `"${s.customerName||""}"`,
        `"${s.city||s.deliveryCity||""}"`,
        `"${s.status||""}"`,
        `"${s.paymentMode||""}"`,
        `"${s.weight||""}"`,
        `"${s.orderValue||""}"`
      ]);

      const csv  = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
      const blob = new Blob([csv], { type:"text/csv" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "shipments-" + new Date().toISOString().slice(0,10) + ".csv";
      a.click();
      URL.revokeObjectURL(url);
      showToast("✅ CSV exported!");
    }

    function closePopup() {
      document.getElementById("popup").classList.remove("show");
      currentShipment = null;
    }

    // Close on overlay click
    document.getElementById("popup").addEventListener("click", function(e) {
      if (e.target === this) closePopup();
    });

    function logout() {
      localStorage.removeItem("adminToken");
      window.location.href = "login.html";
    }

    loadShipments();
  </script>

</body>
</html>
